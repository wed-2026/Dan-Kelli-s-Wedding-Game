<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dan & Kelli's Wedding Game</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background: #ffd6cc; /* Soft coral */
      color: #6d4c41;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 24px 16px 16px 16px;
      border: 2px solid #ffe0e6;
      position: relative;
      z-index: 1;
    }
    .header {
      text-align: center;
      margin-bottom: 18px;
    }
    .header h1 {
      font-family: 'Brush Script MT', cursive;
      font-size: 2em;
      color: #b03a5c;
      margin-bottom: 0;
    }
    .header p {
      font-size: 1em;
      color: #009688; /* Peacock green */
      margin-top: 0;
      font-weight: bold;
    }
    .heart {
      color: #b03a5c;
      font-size: 1.3em;
      margin: 0 4px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      font-size: 1em;
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #3a5ca8;
    }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ffe0e6;
      border-radius: 8px;
      font-size: 1em;
      background: #fff8f0;
      margin-bottom: 2px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #009688; /* Peacock green */
      font-size: 1em;
      font-weight: bold;
    }
    .divider {
      border: none;
      border-top: 2px dashed #ffe0e6;
      margin: 18px 0;
    }
    /* Vines styling */
    .vine {
      position: fixed;
      top: 0;
      left: 0;
      width: 160px;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
    }
    .vine-right {
      left: auto;
      right: 0;
      transform: scaleX(-1);
    }
    .vine path {
      stroke: #9caf88;
      stroke-width: 5;
      fill: none;
    }
    .leaf {
      fill: #9caf88;
      opacity: 0.9;
    }
    .heart-flower {
      fill: #b03a5c;
      font-size: 32px;
      animation: floatHeart 3s ease-in-out infinite alternate;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0); }
      100% { transform: translateY(-12px); }
    }
    @media (max-width: 600px) {
      .container {
        max-width: 95vw;
        padding: 8px;
      }
      .vine {
        width: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- Left double vine with more leaves -->
  <svg class="vine" viewBox="0 0 160 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- First vine -->
    <path d="M80,0 Q120,100 40,200 Q10,300 100,400 Q150,500 60,600 Q20,700 120,800 Q140,900 80,1000"/>
    <!-- Second vine (intertwined) -->
    <path d="M40,60 Q100,180 60,300 Q20,400 120,500 Q140,600 60,700 Q20,800 100,900 Q120,980 80,1000"/>
    <!-- Leaves for first vine -->
    <ellipse class="leaf" cx="100" cy="80" rx="13" ry="5" transform="rotate(-20 100 80)"/>
    <ellipse class="leaf" cx="60" cy="180" rx="10" ry="4" transform="rotate(30 60 180)"/>
    <ellipse class="leaf" cx="30" cy="250" rx="12" ry="5" transform="rotate(-15 30 250)"/>
    <ellipse class="leaf" cx="90" cy="320" rx="11" ry="4" transform="rotate(25 90 320)"/>
    <ellipse class="leaf" cx="120" cy="420" rx="13" ry="5" transform="rotate(-30 120 420)"/>
    <ellipse class="leaf" cx="70" cy="500" rx="10" ry="4" transform="rotate(20 70 500)"/>
    <ellipse class="leaf" cx="40" cy="600" rx="12" ry="5" transform="rotate(-10 40 600)"/>
    <ellipse class="leaf" cx="110" cy="700" rx="11" ry="4" transform="rotate(15 110 700)"/>
    <ellipse class="leaf" cx="130" cy="800" rx="13" ry="5" transform="rotate(-25 130 800)"/>
    <ellipse class="leaf" cx="90" cy="900" rx="12" ry="5" transform="rotate(30 90 900)"/>
    <!-- Leaves for second vine -->
    <ellipse class="leaf" cx="60" cy="100" rx="10" ry="4" transform="rotate(10 60 100)"/>
    <ellipse class="leaf" cx="80" cy="200" rx="12" ry="5" transform="rotate(-20 80 200)"/>
    <ellipse class="leaf" cx="50" cy="320" rx="11" ry="4" transform="rotate(25 50 320)"/>
    <ellipse class="leaf" cx="110" cy="400" rx="13" ry="5" transform="rotate(-30 110 400)"/>
    <ellipse class="leaf" cx="80" cy="520" rx="10" ry="4" transform="rotate(20 80 520)"/>
    <ellipse class="leaf" cx="40" cy="600" rx="12" ry="5" transform="rotate(-10 40 600)"/>
    <ellipse class="leaf" cx="120" cy="700" rx="11" ry="4" transform="rotate(15 120 700)"/>
    <ellipse class="leaf" cx="100" cy="800" rx="13" ry="5" transform="rotate(-25 100 800)"/>
    <ellipse class="leaf" cx="80" cy="900" rx="12" ry="5" transform="rotate(30 80 900)"/>
    <!-- Hearts as flowers -->
    <text x="110" y="120" class="heart-flower">❤</text>
    <text x="50" y="260" class="heart-flower">❤</text>
    <text x="120" y="420" class="heart-flower">❤</text>
    <text x="60" y="600" class="heart-flower">❤</text>
    <text x="130" y="800" class="heart-flower">❤</text>
    <text x="90" y="900" class="heart-flower">❤</text>
  </svg>
  <!-- Right double vine with more leaves (mirrored) -->
  <svg class="vine vine-right" viewBox="0 0 160 1000" xmlns="http://www.w3.org/2000/svg">
    <path d="M80,0 Q120,100 40,200 Q10,300 100,400 Q150,500 60,600 Q20,700 120,800 Q140,900 80,1000"/>
    <path d="M40,60 Q100,180 60,300 Q20,400 120,500 Q140,600 60,700 Q20,800 100,900 Q120,980 80,1000"/>
    <ellipse class="leaf" cx="100" cy="80" rx="13" ry="5" transform="rotate(-20 100 80)"/>
    <ellipse class="leaf" cx="60" cy="180" rx="10" ry="4" transform="rotate(30 60 180)"/>
    <ellipse class="leaf" cx="30" cy="250" rx="12" ry="5" transform="rotate(-15 30 250)"/>
    <ellipse class="leaf" cx="90" cy="320" rx="11" ry="4" transform="rotate(25 90 320)"/>
    <ellipse class="leaf" cx="120" cy="420" rx="13" ry="5" transform="rotate(-30 120 420)"/>
    <ellipse class="leaf" cx="70" cy="500" rx="10" ry="4" transform="rotate(20 70 500)"/>
    <ellipse class="leaf" cx="40" cy="600" rx="12" ry="5" transform="rotate(-10 40 600)"/>
    <ellipse class="leaf" cx="110" cy="700" rx="11" ry="4" transform="rotate(15 110 700)"/>
    <ellipse class="leaf" cx="130" cy="800" rx="13" ry="5" transform="rotate(-25 130 800)"/>
    <ellipse class="leaf" cx="90" cy="900" rx="12" ry="5" transform="rotate(30 90 900)"/>
    <ellipse class="leaf" cx="60" cy="100" rx="10" ry="4" transform="rotate(10 60 100)"/>
    <ellipse class="leaf" cx="80" cy="200" rx="12" ry="5" transform="rotate(-20 80 200)"/>
    <ellipse class="leaf" cx="50" cy="320" rx="11" ry="4" transform="rotate(25 50 320)"/>
    <ellipse class="leaf" cx="110" cy="400" rx="13" ry="5" transform="rotate(-30 110 400)"/>
    <ellipse class="leaf" cx="80" cy="520" rx="10" ry="4" transform="rotate(20 80 520)"/>
    <ellipse class="leaf" cx="40" cy="600" rx="12" ry="5" transform="rotate(-10 40 600)"/>
    <ellipse class="leaf" cx="120" cy="700" rx="11" ry="4" transform="rotate(15 120 700)"/>
    <ellipse class="leaf" cx="100" cy="800" rx="13" ry="5" transform="rotate(-25 100 800)"/>
    <ellipse class="leaf" cx="80" cy="900" rx="12" ry="5" transform="rotate(30 80 900)"/>
    <text x="110" y="120" class="heart-flower">❤</text>
    <text x="50" y="260" class="heart-flower">❤</text>
    <text x="120" y="420" class="heart-flower">❤</text>
    <text x="60" y="600" class="heart-flower">❤</text>
    <text x="130" y="800" class="heart-flower">❤</text>
    <text x="90" y="900" class="heart-flower">❤</text>
  </svg>
  <div class="container">
    <div class="header">
      <span class="heart">❤</span>
      <h1>Dan & Kelli's Wedding Game</h1>
      <p>Make your best guesses for a night full of love, laughter, and surprises!</p>
      <span class="heart">❤</span>
    </div>
    <form>
      <div class="form-group">
        <label>1. Who do you think will cry first during their vows?</label>
        <input type="text" name="cry_first" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>2. Who do you think will smash cake into the other's face?</label>
        <input type="text" name="cake_smash" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>3. Who do you think is messing up the first dance?</label>
        <input type="text" name="first_dance" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>4. Who do you think is going to be on the dance floor longest?</label>
        <input type="text" name="dance_longest" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>5. Who's going to be late for the wedding?</label>
        <input type="text" name="late" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>6. Who's getting two slices of cake?</label>
        <input type="text" name="two_cakes" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>7. Do you think Dan will wear a bow tie?</label>
        <select name="bow_tie">
          <option value="">Select...</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="form-group">
        <label>8. Do you think Kelli is wearing sleeves or strapless?</label>
        <select name="dress_style">
          <option value="">Select...</option>
          <option value="Sleeves">Sleeves</option>
          <option value="Strapless">Strapless</option>
        </select>
      </div>
      <div class="form-group">
        <label>9. Who do you think will be caught with their eyes closed during a photo?</label>
        <input type="text" name="eyes_closed" placeholder="Your guess...">
      </div>
      <div class="form-group">
        <label>10. Where do you think Dan & Kelli are honeymooning?</label>
        <input type="text" name="honeymoon" placeholder="Your guess...">
      </div>
      <hr class="divider">
      <div class="form-group">
        <label>Your Name (optional):</label>
        <input type="text" name="guest_name" placeholder="Let us know who you are!">
      </div>
      <div class="form-group">
        <label>Please share your well wishes and prayers for the couple:</label>
        <textarea name="well_wishes" placeholder="Write your message here..."></textarea>
      </div>
    </form>
    <div class="footer">
      Thank you for playing! Wishing Dan & Kelli a lifetime of love and laughter<br>
      <span class="heart">❤</span>
    </div>
  </div>
</body>
</html>
